<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 中国象棋</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 320px; width: 90%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 24px; border-radius: 12px; }
        .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px; }
        .form-control:focus { background: rgba(255,255,255,0.15); border-color: #e94560; color: #fff; }
        .form-control::placeholder { color: rgba(255,255,255,0.5); }
        .btn-primary { padding: 10px; }
        .alert { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card p-4">
            <h3 class="text-center mb-4" style="color: #fff;">🎮 中国象棋</h3>
            
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            
            <form method="post" action="/login">
                <div class="mb-3">
                    <label class="form-label" style="color: #fff;">用户名</label>
                    <input type="text" name="username" class="form-control" value="hlb" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="color: #fff;">密码</label>
                    <input type="password" name="password" class="form-control" value="111111" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">登录</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="/register" style="color: rgba(255,255,255,0.7);">还没有账号？立即注册</a>
            </div>
            
            <div class="text-center mt-2">
                <a href="/password/forgot" style="color: rgba(255,255,255,0.6);">忘记密码？</a>
            </div>
            
            <div class="text-center mt-2">
                <a href="/" style="color: rgba(255,255,255,0.5);">返回首页</a>
            </div>
        </div>
    </div>
</body>
</html>

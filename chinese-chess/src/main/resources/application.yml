server:
  port: 8080

spring:
  main:
    allow-circular-references: true
  application:
    name: chinese-chess
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 去掉无效的 pipeName 参数；若用命名管道请改用 socketFactory 与 namedPipePath
    url: jdbc:mysql://127.0.0.1:8888/chess?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 888888
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      # 连接超时 10 秒，避免 MySQL 不可用时请求一直挂起
      connection-timeout: 10000
      # 启动时若连不上数据库则快速失败（毫秒），便于排查
      initialization-fail-timeout: 5000
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.chess.model
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.chess: DEBUG

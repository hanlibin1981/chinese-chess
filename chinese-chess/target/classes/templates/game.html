<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对局室 - 中国象棋</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; }
        .chess-board { 
            width: 560px; 
            height: 620px; 
            background: #deb887; 
            border: 3px solid #8b4513;
            position: relative;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: visible;
        }
        .chess-cell {
            position: absolute;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 2px;
            box-sizing: border-box;
            border: 1px solid rgba(139, 69, 19, 0.3);
        }
        .chess-piece {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            user-select: none;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }
        .piece-red { background: linear-gradient(145deg, #ff6b6b, #c0392b); color: #fff; border: 2px solid #8b0000; }
        .piece-black { background: linear-gradient(145deg, #2c3e50, #1a252f); color: #fff; border: 2px solid #000; }
        .selected { box-shadow: 0 0 10px 3px #ffd700; }
        .valid-move { background-color: rgba(0, 255, 0, 0.3); border-radius: 50%; }
        .valid-capture { background-color: rgba(255, 0, 0, 0.3); border-radius: 50%; }
        .valid-move { box-shadow: inset 0 0 10px 3px rgba(0,255,0,0.5); }
        .valid-capture { box-shadow: inset 0 0 10px 3px rgba(255,0,0,0.5); }
        
        /* 提示高亮样式 */
        .hint-from { 
            box-shadow: 0 0 15px 5px #00ff00 !important;
            animation: pulse 1s infinite;
        }
        .hint-to { 
            box-shadow: 0 0 15px 5px #ffff00 !important;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        
        /* 楚河汉界 */
        .river {
            position: absolute;
            top: 50%;
            left: 80px;
            right: 80px;
            height: 60px;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #8b4513;
            font-weight: bold;
            z-index: 1;
        }
            z-index: 1;
        }
        
        /* 棋盘线 */
        .board-line {
            position: absolute;
            background: #8b4513;
            z-index: 1;
        }
        .line-horizontal { height: 3px; width: 540px; }
        .line-vertical { width: 3px; }
        
        /* 九宫斜线 */
        .palace-line {
            position: absolute;
            width: 2px;
            background: #8b4513;
            z-index: 2;
        }
        
        .navbar { background: rgba(0,0,0,0.3) !important; }
        
        .game-info { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 10px;
            padding: 15px;
            color: #fff;
        }
        
        .turn-indicator { 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-weight: bold;
        }
        .turn-red { background: #e74c3c; color: #fff; }
        .turn-black { background: #2c3e50; color: #fff; }
        
        .spectators {
            max-height: 200px;
            overflow-y: auto;
        }
        
        /* 棋子移动动画 */
        @keyframes pieceMove {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        @keyframes pieceCapture {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        @keyframes checkPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
        
        .piece-moving {
            animation: pieceMove 0.3s ease-in-out;
            z-index: 100;
        }
        
        .piece-captured {
            animation: pieceCapture 0.3s ease-out forwards;
        }
        
        .king-in-check {
            animation: checkPulse 1s infinite;
            border: 3px solid red !important;
        }
        
        /* 选中动画 */
        .piece-selected {
            animation: pieceMove 0.5s infinite;
        }
        
        /* 局面分析面板样式 */
        .analysis-panel {
            max-width: 300px;
            margin: 10px auto;
        }
        
        .score-display {
            font-size: 1.2em;
            margin: 10px 0;
        }
        
        .score-red {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .score-black {
            color: #3498db;
            font-weight: bold;
        }
        
        .score-neutral {
            color: #f39c12;
            font-weight: bold;
        }
        
        .evaluation-text {
            font-size: 0.9em;
            color: #aaa;
            margin: 5px 0;
        }
        
        .suggestion-text {
            font-size: 0.85em;
            color: #4caf50;
            font-style: italic;
            margin: 5px 0;
            padding: 5px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 5px;
        }
        
        /* 计时器样式 */
        .timer-panel {
            max-width: 300px;
            margin: 10px auto;
        }
        
        .timer-value {
            font-size: 1.5em;
            font-weight: bold;
            font-family: monospace;
        }
        
        @media (max-width: 768px) {
            .chess-board {
                width: 100%;
                max-width: 360px;
                height: auto;
                aspect-ratio: 9/10;
            }
            .chess-piece {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🎮 中国象棋</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-item nav-link" href="/">大厅</a>
                <a class="nav-item nav-link" href="/games">棋谱</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <div class="game-info mb-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="text-muted">红方:</span> 
                            <strong id="redPlayer" th:text="${game.redUsername}">--</strong>
                            <span th:if="${game.playerRed == user?.id}" class="badge bg-danger">你</span>
                        </div>
                        <div class="turn-indicator" id="turnIndicator">
                            <span id="turnText">等待中...</span>
                        </div>
                        <div>
                            <span class="text-muted">黑方:</span> 
                            <strong id="blackPlayer" th:text="${game.isAi ? 'AI' : '--'}">--</strong>
                            <span th:if="${game.playerBlack == user?.id}" class="badge bg-dark">你</span>
                        </div>
                    </div>
                </div>
                
                <div class="chess-board" id="board">
                    <!-- 棋盘将由JS生成 -->
                </div>
                
                <!-- 局面分析面板 -->
                <div class="analysis-panel mt-3" id="analysisPanel" style="display: none;">
                    <div class="card bg-dark text-white">
                        <div class="card-body">
                            <h6>📊 局面分析</h6>
                            <div class="score-display">
                                <span id="scoreLabel">评分:</span>
                                <span id="scoreValue" class="score-neutral">0</span>
                            </div>
                            <div id="evaluation" class="evaluation-text"></div>
                            <div id="suggestion" class="suggestion-text"></div>
                            <button class="btn btn-sm btn-outline-info mt-2" onclick="requestAnalysis()">🔄 刷新分析</button>
                        </div>
                    </div>
                </div>
                
                <!-- 计时器 -->
                <div class="timer-panel mt-3" id="timerPanel">
                    <div class="card bg-dark text-white">
                        <div class="card-body">
                            <h6>⏱️ 计时</h6>
                            <div class="d-flex justify-content-between">
                                <div>
                                    <small class="text-muted">红方</small>
                                    <div id="redTimer" class="timer-value">10:00</div>
                                </div>
                                <div>
                                    <small class="text-muted">黑方</small>
                                    <div id="blackTimer" class="timer-value">10:00</div>
                                </div>
                            </div>
                            <div class="mt-2">
                                <button class="btn btn-sm btn-outline-warning" onclick="toggleTimer()">⏯️ 暂停/继续</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="resetTimer()">🔄 重置</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-3">
                    <button class="btn btn-warning" onclick="requestUndo()">悔棋</button>
                    <button class="btn btn-secondary" onclick="surrender()">认输</button>
                    <button class="btn btn-info" onclick="restartGame()" th:if="${game.isAi}">重新开始</button>
                    <button class="btn btn-success" onclick="requestHint()" th:if="${game.isAi}">💡 提示</button>
                    <button class="btn btn-warning" onclick="toggleAnalysis()">📊 分析</button>
                    <button class="btn btn-primary" id="soundBtn" onclick="toggleSound()">🔊 音效</button>
                    <button class="btn btn-dark" onclick="shareGame()">📤 分享</button>
                    <div class="btn-group mt-2" th:if="${game.isAi}">
                        <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            难度: <span id="difficultyDisplay">中等</span>
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="setDifficulty('EASY')">简单</a></li>
                            <li><a class="dropdown-item" href="#" onclick="setDifficulty('MEDIUM')">中等</a></li>
                            <li><a class="dropdown-item" href="#" onclick="setDifficulty('HARD')">困难</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="game-info">
                    <h5>📜 走法记录</h5>
                    <div id="moveList" style="max-height: 300px; overflow-y: auto; font-family: monospace;">
                        <p class="text-muted">等待开始...</p>
                    </div>
                </div>
                
                <div class="game-info mt-3">
                    <h5>👀 观战者</h5>
                    <div class="spectators" id="spectators">
                        <p class="text-muted">暂无观战者</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // 声音上下文
        let audioCtx = null;
        let soundEnabled = true;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 音效' : '🔇 静音';
        }
        
        // 落子声音 - 清脆的点击声
        function playMoveSound() {
            if (!soundEnabled) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.08);
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
        
        // 吃子声音 - 更有冲击力的声音
        function playCaptureSound() {
            if (!soundEnabled) return;
            initAudio();
            // 第一声
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc1.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.15);
            osc1.type = 'square';
            gain1.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.15);
            
            // 第二声
            setTimeout(() => {
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.frequency.setValueAtTime(250, audioCtx.currentTime);
                osc2.type = 'sawtooth';
                gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.2);
            }, 80);
        }
        
        // 将军声音 - 警报声
        function playCheckSound() {
            if (!soundEnabled) return;
            initAudio();
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 1200;
                    osc.type = 'square';
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                }, i * 200);
            }
        }
        
        // 胜利/失败声音
        function playWinSound() {
            if (!soundEnabled) return;
            initAudio();
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.3);
                }, i * 150);
            });
        }
        
        function playLoseSound() {
            if (!soundEnabled) return;
            initAudio();
            const notes = [400, 350, 300, 250];
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sawtooth';
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                }, i * 200);
            });
        }
        
        const gameId = /*[[${game.id}]]*/ 0;
        const userId = /*[[${user?.id}]]*/ null;
        const playerRed = /*[[${game.playerRed}]]*/ null;
        const playerBlack = /*[[${game.playerBlack}]]*/ null;
        const isAi = /*[[${game.isAi}]]*/ false;
        
        let stompClient = null;
        let selectedPiece = null;
        let currentBoard = null;
        let myColor = null;
        
        // 确定我的颜色 - 玩家总是红方（人机模式）
        if (isAi) {
            myColor = 'red';
        } else if (userId === playerRed) {
            myColor = 'red';
        } else if (userId === playerBlack) {
            myColor = 'black';
        }
        
        // 初始化棋盘
        function initBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            // 创建格子
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 9; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'chess-cell';
                    cell.style.left = (j * 60 + 10) + 'px';
                    cell.style.top = (i * 60 + 10) + 'px';
                    cell.dataset.x = i;
                    cell.dataset.y = j;
                    cell.onclick = () => onCellClick(i, j);
                    board.appendChild(cell);
                }
            }
            
            // 绘制棋盘线条
            drawBoardLines(board);
            
            // 楚河汉界
            const river = document.createElement('div');
            river.className = 'river';
            river.innerHTML = '楚河 &nbsp;&nbsp;&nbsp; 汉界';
            board.appendChild(river);
        }
        
        function drawBoardLines(board) {
            const offset = 10; // padding offset
            
            // 横线 - 所有10条横线
            for (let i = 0; i < 10; i++) {
                const line = document.createElement('div');
                line.className = 'board-line line-horizontal';
                line.style.top = ((i * 60) + 30 + offset) + 'px';
                line.style.left = offset + 'px';
                line.style.width = '540px';
                board.appendChild(line);
            }
            
            // 竖线 - 9条竖线完整绘制（0-8列）
            for (let j = 0; j < 9; j++) {
                if (j === 0 || j === 8) {
                    // 最左和最右竖线 - 完整竖线
                    let line = document.createElement('div');
                    line.className = 'board-line line-vertical';
                    line.style.left = ((j * 60) + 30 + offset) + 'px';
                    line.style.top = offset + 'px';
                    line.style.height = '600px';
                    board.appendChild(line);
                } else {
                    // 其他竖线 - 在楚河汉界处断开
                    // 上半部分 (0-4行)
                    let lineTop = document.createElement('div');
                    lineTop.className = 'board-line line-vertical';
                    lineTop.style.left = ((j * 60) + 30 + offset) + 'px';
                    lineTop.style.top = offset + 'px';
                    lineTop.style.height = '270px';
                    board.appendChild(lineTop);
                    
                    // 下半部分 (5-9行)
                    let lineBottom = document.createElement('div');
                    lineBottom.className = 'board-line line-vertical';
                    lineBottom.style.left = ((j * 60) + 30 + offset) + 'px';
                    lineBottom.style.top = (330 + offset) + 'px';
                    lineBottom.style.height = '270px';
                    board.appendChild(lineBottom);
                }
            }
            
            // 九宫斜线 (红方 7-9行)
            addPalaceLines(board, 7, 3, 5, offset);
            // 九宫斜线 (黑方 0-2行)
            addPalaceLines(board, 0, 3, 5, offset);
        }
        
        function addPalaceLines(board, row, colStart, colEnd, offset = 10) {
            const positions = [
                [row, colStart, row + 2, colEnd],
                [row + 2, colStart, row, colEnd]
            ];
            
            positions.forEach(([x1, y1, x2, y2]) => {
                const line = document.createElement('div');
                line.className = 'palace-line';
                
                const dx = (y2 - y1) * 30;
                const dy = (x2 - x1) * 30;
                const length = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                
                line.style.width = length + 'px';
                line.style.left = (y1 * 60 + 30 + offset) + 'px';
                line.style.top = (x1 * 60 + 30 + offset) + 'px';
                line.style.transform = `rotate(${angle}deg)`;
                line.style.transformOrigin = '0 0';
                
                board.appendChild(line);
            });
        }
        
        function renderBoard(boardData) {
            currentBoard = boardData;
            const cells = document.querySelectorAll('.chess-cell');
            cells.forEach(cell => {
                cell.innerHTML = '';
                cell.classList.remove('selected', 'valid-move', 'valid-capture');
            });
            
            const board = boardData.board;
            const isRedData = boardData.isRed || [];
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 9; j++) {
                    const piece = board[i][j];
                    if (piece) {
                        const cell = document.querySelector(`.chess-cell[data-x="${i}"][data-y="${j}"]`);
                        const pieceDiv = document.createElement('div');
                        // 使用 isRed 数组来判断棋子颜色
                        const isPieceRed = isRedData[i] && isRedData[i][j];
                        pieceDiv.className = 'chess-piece ' + (isPieceRed ? 'piece-red' : 'piece-black');
                        // 棋子名称就是piece本身
                        pieceDiv.textContent = piece;
                        cell.appendChild(pieceDiv);
                    }
                }
            }
            
            // 更新回合指示
            const turnIndicator = document.getElementById('turnIndicator');
            const turnText = document.getElementById('turnText');
            if (boardData.currentTurn === 'red') {
                turnIndicator.className = 'turn-indicator turn-red';
                turnText.textContent = '红方回合';
            } else {
                turnIndicator.className = 'turn-indicator turn-black';
                turnText.textContent = '黑方回合';
            }
            
            // 更新玩家信息
            document.getElementById('redPlayer').textContent = '[[${game.redUsername}]]';
            document.getElementById('blackPlayer').textContent = isAi ? 'AI' : '[[${game.blackUsername}]]';
        }
        
        function onCellClick(x, y) {
            if (!myColor || !currentBoard) return;
            if (currentBoard.currentTurn !== myColor) return;
            
            const piece = currentBoard.board[x][y];
            const isRedData = currentBoard.isRed || [];
            const isPieceRed = isRedData[x] && isRedData[x][y];
            const isMyPiece = piece && (
                (myColor === 'red' && isPieceRed) ||
                (myColor === 'black' && !isPieceRed)
            );
            
            if (selectedPiece) {
                // 尝试移动
                if (piece && isMyPiece) {
                    // 选自己的另一个棋子
                    selectPiece(x, y);
                } else {
                    // 尝试走这步
                    tryMove(selectedPiece.x, selectedPiece.y, x, y);
                    clearSelection();
                }
            } else {
                // 选择棋子
                if (isMyPiece) {
                    selectPiece(x, y);
                }
            }
        }
        
        function selectPiece(x, y) {
            clearSelection();
            selectedPiece = { x, y };
            const cell = document.querySelector(`.chess-cell[data-x="${x}"][data-y="${y}"]`);
            cell.classList.add('selected');
        }
        
        function clearSelection() {
            document.querySelectorAll('.selected, .valid-move, .valid-capture').forEach(el => {
                el.classList.remove('selected', 'valid-move', 'valid-capture');
            });
            selectedPiece = null;
        }
        
        function tryMove(fromX, fromY, toX, toY) {
            stompClient.send("/app/game/move", {}, JSON.stringify({
                gameId: gameId,
                userId: userId,
                fromX: fromX,
                fromY: fromY,
                toX: toX,
                toY: toY
            }));
        }
        
        function requestUndo() {
            if (!userId) return;
            stompClient.send("/app/game/undo", {}, JSON.stringify({
                gameId: gameId,
                userId: userId
            }));
        }
        
        function surrender() {
            if (confirm('确定要认输吗？')) {
                // 发送认输消息
            }
        }
        
        function requestHint() {
            if (!userId || !isAi) return;
            stompClient.send("/app/game/hint", {}, JSON.stringify({
                gameId: gameId,
                userId: userId
            }));
        }
        
        function setDifficulty(difficulty) {
            stompClient.send("/app/game/setDifficulty", {}, JSON.stringify({
                difficulty: difficulty
            }));
            document.getElementById('difficultyDisplay').textContent = 
                difficulty === 'EASY' ? '简单' : 
                difficulty === 'MEDIUM' ? '中等' : '困难';
        }
        
        // 局面分析功能
        let analysisVisible = false;
        
        function toggleAnalysis() {
            analysisVisible = !analysisVisible;
            const panel = document.getElementById('analysisPanel');
            panel.style.display = analysisVisible ? 'block' : 'none';
            if (analysisVisible) {
                requestAnalysis();
            }
        }
        
        function requestAnalysis() {
            if (!stompClient || !gameId) return;
            stompClient.send("/app/game/analyze", {}, JSON.stringify({
                gameId: gameId
            }));
        }
        
        function showAnalysis(data) {
            const score = data.score || 0;
            const evaluation = data.evaluation || '未知';
            const suggestion = data.suggestion || '';
            
            const scoreEl = document.getElementById('scoreValue');
            const evalEl = document.getElementById('evaluation');
            const suggEl = document.getElementById('suggestion');
            
            scoreEl.textContent = (score > 0 ? '+' : '') + score;
            scoreEl.className = score > 50 ? 'score-red' : score < -50 ? 'score-black' : 'score-neutral';
            
            evalEl.textContent = evaluation;
            suggEl.textContent = suggestion;
        }
        
        // 分享棋谱功能
        function shareGame() {
            if (!currentBoard || !currentBoard.moves) {
                alert('暂无棋谱可分享');
                return;
            }
            
            // 生成棋谱分享数据
            const shareData = {
                gameId: gameId,
                moves: currentBoard.moves,
                board: currentBoard.board,
                timestamp: new Date().toISOString()
            };
            
            // 编码为Base64
            const encoded = btoa(JSON.stringify(shareData));
            const shareUrl = window.location.origin + '/game/' + gameId + '?replay=' + encoded;
            
            // 复制到剪贴板
            if (navigator.clipboard) {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    alert('分享链接已复制到剪贴板！');
                }).catch(() => {
                    prompt('分享链接：', shareUrl);
                });
            } else {
                prompt('分享链接：', shareUrl);
            }
        }
        
        // 复盘功能 - 逐步回放
        let replayIndex = 0;
        let replayTimer = null;
        
        function startReplay() {
            if (!currentBoard || !currentBoard.moves || currentBoard.moves.length === 0) {
                alert('暂无棋谱可复盘');
                return;
            }
            
            replayIndex = 0;
            const startBoard = getInitialBoard();
            renderBoard(startBoard);
            
            replayTimer = setInterval(() => {
                if (replayIndex >= currentBoard.moves.length) {
                    clearInterval(replayTimer);
                    return;
                }
                
                const move = currentBoard.moves[replayIndex];
                applyMove(startBoard, move);
                renderBoard(startBoard);
                replayIndex++;
            }, 1000);
        }
        
        function stopReplay() {
            if (replayTimer) {
                clearInterval(replayTimer);
                replayTimer = null;
            }
            if (currentBoard) {
                renderBoard(currentBoard);
            }
        }
        
        function getInitialBoard() {
            return {
                board: [
                    ["車","馬","相","士","將","士","相","馬","車"],
                    [null,null,null,null,null,null,null,null,null],
                    [null,"炮",null,null,null,null,null,"炮",null],
                    ["卒",null,"卒",null,"卒",null,"卒",null,"卒"],
                    [null,null,null,null,null,null,null,null,null],
                    [null,null,null,null,null,null,null,null,null],
                    ["兵",null,"兵",null,"兵",null,"兵",null,"兵"],
                    [null,"炮",null,null,null,null,null,null,null],
                    [null,null,null,null,null,null,null,null,null],
                    ["車","馬","相","仕","帥","仕","相","馬","車"]
                ],
                isRed: [
                    [false,false,false,false,false,false,false,false,false],
                    [false,false,false,false,false,false,false,false,false],
                    [false,false,false,false,false,false,false,false,false],
                    [false,false,false,false,false,false,false,false,false],
                    [false,false,false,false,false,false,false,false,false],
                    [false,false,false,false,false,false,false,false,false],
                    [true,true,true,true,true,true,true,true,true],
                    [true,true,true,true,true,true,true,true,true],
                    [true,true,true,true,true,true,true,true,true],
                    [true,true,true,true,true,true,true,true,true]
                ],
                currentTurn: "red",
                moves: []
            };
        }
        
        function applyMove(board, move) {
            const piece = board.board[move.fromX][move.fromY];
            const isRed = board.isRed[move.fromX][move.fromY];
            
            board.board[move.fromX][move.fromY] = null;
            board.isRed[move.fromX][move.fromY] = null;
            
            board.board[move.toX][move.toY] = piece;
            board.isRed[move.toX][move.toY] = isRed;
            
            board.currentTurn = board.currentTurn === "red" ? "black" : "red";
        }
        
        // 计时器功能
        let timerInterval = null;
        let redTime = 600; // 10分钟
        let blackTime = 600;
        let timerRunning = false;
        
        function toggleTimer() {
            if (timerRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }
        
        function startTimer() {
            if (timerRunning) return;
            timerRunning = true;
            timerInterval = setInterval(() => {
                if (currentBoard && currentBoard.currentTurn === 'red') {
                    redTime--;
                    updateTimerDisplay('red', redTime);
                    if (redTime <= 0) {
                        clearInterval(timerInterval);
                        alert('红方超时负！');
                    }
                } else if (currentBoard && currentBoard.currentTurn === 'black') {
                    blackTime--;
                    updateTimerDisplay('black', blackTime);
                    if (blackTime <= 0) {
                        clearInterval(timerInterval);
                        alert('黑方超时负！');
                    }
                }
            }, 1000);
        }
        
        function pauseTimer() {
            timerRunning = false;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function resetTimer() {
            pauseTimer();
            redTime = 600;
            blackTime = 600;
            updateTimerDisplay('red', redTime);
            updateTimerDisplay('black', blackTime);
        }
        
        function updateTimerDisplay(color, seconds) {
            const el = document.getElementById(color + 'Timer');
            if (el) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                el.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
                if (seconds < 60) {
                    el.classList.add('text-danger');
                }
            }
        }
        
        function restartGame() {
            if (confirm('确定要重新开始吗？')) {
                // 通过 WebSocket 发送重新开始消息
                if (stompClient) {
                    stompClient.send("/app/game/restart", {}, JSON.stringify({
                        gameId: gameId
                    }));
                } else {
                    // 如果 WebSocket 未连接，使用 REST API
                    fetch('/game/restart/' + gameId, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            window.location.reload();
                        } else {
                            alert(data.message || '重新开始失败');
                        }
                    })
                    .catch(err => {
                        console.error('Restart error:', err);
                        alert('重新开始失败');
                    });
                }
            }
        }
        
        // WebSocket连接
        function connect() {
            const socket = new SockJS('/ws/chess');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function(frame) {
                console.log('Connected');
                
                // 加入游戏
                stompClient.send("/app/game/join", {}, JSON.stringify({
                    gameId: gameId,
                    userId: userId
                }));
                
                // 订阅游戏消息
                stompClient.subscribe('/topic/game/' + gameId, function(message) {
                    const data = JSON.parse(message.body);
                    const prevBoard = currentBoard ? JSON.parse(JSON.stringify(currentBoard)) : null;
                    
                    if (data.type === 'state' || data.type === 'move') {
                        const newBoard = data.board || data;
                        
                        // 播放声音和动画
                        if (prevBoard) {
                            const moved = findMovedPiece(prevBoard, newBoard);
                            if (moved) {
                                // 添加移动动画
                                animatePieceMove(moved);
                                
                                if (moved.captured) {
                                    playCaptureSound();
                                } else {
                                    playMoveSound();
                                }
                            }
                        }
                        
                        renderBoard(newBoard);
                        updateMoveList(newBoard);
                    } else if (data.type === 'gameOver') {
                        if (data.winner === myColor) {
                            playWinSound();
                        } else {
                            playLoseSound();
                        }
                        alert('游戏结束！' + (data.winner === 'red' ? '红方' : '黑方') + '获胜！');
                    } else if (data.type === 'checkmate') {
                        if (data.winner === myColor) {
                            playWinSound();
                        } else {
                            playLoseSound();
                        }
                        alert('将死！游戏结束！' + (data.winner === 'red' ? '红方' : '黑方') + '获胜！');
                    } else if (data.type === 'check') {
                        playCheckSound();
                        // 显示将军提示并高亮将
                        highlightKing(data.board);
                        const turnText = document.getElementById('turnText');
                        if (turnText) {
                            turnText.textContent += ' - 将军！';
                        }
                    } else if (data.type === 'undoRequested') {
                        if (confirm('对方请求悔棋，是否同意？')) {
                            requestUndo();
                        }
                    } else if (data.type === 'undoAccepted') {
                        alert('悔棋成功');
                        renderBoard(data.board);
                    } else if (data.type === 'error') {
                        alert(data.message);
                    } else if (data.type === 'restarted') {
                        // 重新开始
                        renderBoard(data.board);
                        updateMoveList(data.board);
                        alert('游戏重新开始！');
                    } else if (data.type === 'hint') {
                        // 显示走法提示
                        showHint(data.hintMove);
                    } else if (data.type === 'difficultyChanged') {
                        // 难度已更改
                        document.getElementById('difficultyDisplay').textContent = data.difficulty;
                    } else if (data.type === 'analysis') {
                        // 显示局面分析
                        showAnalysis(data);
                    }
                });
            }, function(error) {
                console.error('Connection error:', error);
                setTimeout(connect, 5000);
            });
        }
        
        function updateMoveList(boardData) {
            const moveList = document.getElementById('moveList');
            const moves = boardData.moves || [];
            
            if (moves.length === 0) {
                moveList.innerHTML = '<p class="text-muted">等待开始...</p>';
            } else {
                let html = '<table class="table table-sm" style="color: #fff;"><tbody>';
                
                // 棋盘坐标转换
                const colNames = ["一", "二", "三", "四", "五", "六", "七", "八", "九"];
                const rowNames = ["九", "八", "七", "六", "五", "四", "三", "二", "一"];
                
                for (let i = 0; i < Math.ceil(moves.length / 2); i++) {
                    const redMove = moves[i * 2];
                    const blackMove = moves[i * 2 + 1];
                    
                    let redNotation = "-";
                    let blackNotation = "-";
                    
                    if (redMove) {
                        const from = colNames[Math.min(redMove.fromY, 8)] + rowNames[Math.min(redMove.fromX, 8)];
                        const to = colNames[Math.min(redMove.toY, 8)] + rowNames[Math.min(redMove.toX, 8)];
                        redNotation = redMove.piece + from + to;
                    }
                    
                    if (blackMove) {
                        const from = colNames[Math.min(blackMove.fromY, 8)] + rowNames[Math.min(blackMove.fromX, 8)];
                        const to = colNames[Math.min(blackMove.toY, 8)] + rowNames[Math.min(blackMove.toX, 8)];
                        blackNotation = blackMove.piece + from + to;
                    }
                    
                    html += '<tr><td>' + (i + 1) + '</td><td>' + redNotation + '</td><td>' + blackNotation + '</td></tr>';
                }
                
                html += '</tbody></table>';
                moveList.innerHTML = html;
                
                // 滚动到底部
                moveList.scrollTop = moveList.scrollHeight;
            }
        }
        
        // 比较棋盘找出移动的棋子
        function findMovedPiece(oldBoard, newBoard) {
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 9; j++) {
                    const oldPiece = oldBoard.board[i][j];
                    const newPiece = newBoard.board[i][j];
                    
                    // 原来有子，现在没了 - 可能是走了或被吃了
                    if (oldPiece && !newPiece) {
                        // 找目的地
                        for (let x = 0; x < 10; x++) {
                            for (let y = 0; y < 9; y++) {
                                if (newBoard.board[x][y] === oldPiece && 
                                    (oldBoard.board[x][y] !== oldPiece || x !== i || y !== j)) {
                                    // 检查是否被吃了
                                    const captured = oldBoard.board[x][y] !== null;
                                    return { fromX: i, fromY: j, toX: x, toY: y, piece: oldPiece, captured: captured };
                                }
                            }
                        }
                    }
                }
            }
            return null;
        }
        
        // 显示走法提示
        function showHint(hintMove) {
            if (!hintMove) return;
            
            // 高亮起点和终点
            const fromCell = document.querySelector(`.chess-cell[data-x="${hintMove.fromX}"][data-y="${hintMove.fromY}"]`);
            const toCell = document.querySelector(`.chess-cell[data-x="${hintMove.toX}"][data-y="${hintMove.toY}"]`);
            
            if (fromCell) fromCell.classList.add('hint-from');
            if (toCell) toCell.classList.add('hint-to');
            
            // 5秒后移除高亮
            setTimeout(() => {
                if (fromCell) fromCell.classList.remove('hint-from');
                if (toCell) toCell.classList.remove('hint-to');
            }, 5000);
            
            // 显示提示消息
            alert('提示：建议走 ' + hintMove.piece + ' 从 ' + 
                  getPositionName(hintMove.fromX, hintMove.fromY) + ' 到 ' + 
                  getPositionName(hintMove.toX, hintMove.toY));
        }
        
        // 获取位置名称
        function getPositionName(x, y) {
            const colNames = ["一", "二", "三", "四", "五", "六", "七", "八", "九"];
            const rowNames = ["九", "八", "七", "六", "五", "四", "三", "二", "一"];
            return colNames[y] + rowNames[x];
        }
        
        // 棋子移动动画
        function animatePieceMove(moved) {
            const fromCell = document.querySelector(`.chess-cell[data-x="${moved.fromX}"][data-y="${moved.fromY}"]`);
            const toCell = document.querySelector(`.chess-cell[data-x="${moved.toX}"][data-y="${moved.toY}"]`);
            
            if (fromCell) {
                const piece = fromCell.querySelector('.chess-piece');
                if (piece) {
                    piece.classList.add('piece-moving');
                    setTimeout(() => piece.classList.remove('piece-moving'), 300);
                }
            }
            
            if (moved.captured && toCell) {
                const capturedPiece = toCell.querySelector('.chess-piece');
                if (capturedPiece) {
                    capturedPiece.classList.add('piece-captured');
                }
            }
        }
        
        // 高亮将军的帅/将
        function highlightKing(board) {
            if (!board || !board.board) return;
            
            const b = board.board;
            // 找到帅/将的位置
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 9; j++) {
                    if (b[i][j] === '帥' || b[i][j] === '將') {
                        const cell = document.querySelector(`.chess-cell[data-x="${i}"][data-y="${j}"]`);
                        if (cell) {
                            const piece = cell.querySelector('.chess-piece');
                            if (piece) {
                                piece.classList.add('king-in-check');
                            }
                        }
                    }
                }
            }
        }
        
        // 初始化
        initBoard();
        connect();
    </script>
</body>
